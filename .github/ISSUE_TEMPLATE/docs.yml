name: "📝 문서 작업"
description: "README, 가이드, 컨벤션 문서 등 문서 관련 작업에 사용합니다."
title: "[Docs] "
labels: ["docs"]
body:
  - type: markdown
    attributes:
      value: |
        ## 문서 작업
        작성하거나 수정할 문서에 대해 설명해주세요.

  - type: textarea
    id: description
    attributes:
      label: 작업 설명
      description: 어떤 문서를 작성/수정하려는지 설명해주세요.
      placeholder: "ex) 프로젝트 초기 세팅 가이드를 README에 추가합니다."
    validations:
      required: true

  - type: dropdown
    id: doc_type
    attributes:
      label: 문서 유형
      options:
        - README
        - 컨벤션 / 스타일 가이드
        - 컴포넌트 사용 가이드
        - 환경 설정 가이드
        - API 연동 문서
        - 기타
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 작업 목록
      description: 세부 작업 항목을 체크리스트로 작성해주세요.
      placeholder: |
        - [ ] 문서 초안 작성
        - [ ] 팀 리뷰
        - [ ] 최종 반영
    validations:
      required: true

  - type: textarea
    id: reference
    attributes:
      label: 참고 사항
      description: 참고할 기존 문서나 링크
    validations:
      required: false
