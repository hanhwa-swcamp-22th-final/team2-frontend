name: "🚨 긴급 수정 (Hotfix)"
description: "운영 환경에서 긴급하게 수정해야 할 때 사용합니다."
title: "[Hotfix] "
labels: ["hotfix"]
body:
  - type: markdown
    attributes:
      value: |
        ## 긴급 수정
        ⚠️ 운영 환경에 영향을 주는 긴급한 이슈입니다.
        최대한 빠르게 대응해주세요.

  - type: textarea
    id: description
    attributes:
      label: 문제 상황
      description: 운영에서 발생한 문제를 설명해주세요.
      placeholder: "ex) 로그인 후 메인 페이지가 빈 화면으로 표시됩니다."
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: 심각도
      options:
        - "Critical - 서비스 전체 장애"
        - "High - 주요 기능 사용 불가"
        - "Medium - 일부 기능 오류"
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: 영향 범위
      description: 이 문제가 어떤 사용자/페이지에 영향을 주나요?
      placeholder: "ex) 전체 사용자의 로그인 후 대시보드 접근 불가"
    validations:
      required: true

  - type: textarea
    id: cause
    attributes:
      label: 원인 분석
      description: 파악된 원인이 있다면 적어주세요.
      placeholder: "ex) 최근 배포에서 API baseURL 환경변수가 누락됨"
    validations:
      required: false

  - type: textarea
    id: fix
    attributes:
      label: 수정 방안
      description: 어떻게 수정할 예정인가요?
      placeholder: "ex) .env.production에 VITE_API_URL 추가 후 재배포"
    validations:
      required: true

  - type: dropdown
    id: domain
    attributes:
      label: 도메인
      options:
        - "domain:auth - 인증"
        - "domain:master - 기준정보"
        - "domain:document - 문서"
        - "domain:activity - 활동"
        - "domain:common - 공통 컴포넌트"
    validations:
      required: true
