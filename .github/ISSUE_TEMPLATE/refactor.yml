name: "♻️ 리팩토링"
description: "코드 개선이나 리팩토링이 필요할 때 사용합니다."
title: "[Refactor] "
labels: ["refactor"]
body:
  - type: textarea
    id: description
    attributes:
      label: 리팩토링 대상
      description: 어떤 코드를 왜 개선하려는지 설명해주세요.
      placeholder: "ex) PartnerService의 조회 로직이 중복되어 공통 메서드로 추출합니다."
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 작업 목록
      description: 세부 작업 항목을 체크리스트로 작성해주세요.
      placeholder: |
        - [ ] 중복 로직 추출
        - [ ] 테스트 코드 수정
        - [ ] 동작 확인
    validations:
      required: true

  - type: dropdown
    id: domain
    attributes:
      label: 도메인
      options:
        - Auth
        - Master
        - Document
        - Activity
        - Frontend
        - Infra
    validations:
      required: true
