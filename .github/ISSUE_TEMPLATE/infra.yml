name: "⚙️ 인프라 / 설정"
description: "CI/CD, Docker, 빌드 설정, 환경 변수 관련 작업에 사용합니다."
title: "[Infra] "
labels: ["infra"]
body:
  - type: markdown
    attributes:
      value: |
        ## 인프라 / 설정
        프론트엔드 빌드, 배포, 환경설정 관련 작업을 작성해주세요.

  - type: textarea
    id: description
    attributes:
      label: 작업 설명
      description: 어떤 인프라/설정 작업인지 설명해주세요.
      placeholder: "ex) GitHub Actions로 PR 시 빌드 + 린트 체크 파이프라인을 구성합니다."
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 작업 목록
      description: 세부 작업 항목을 체크리스트로 작성해주세요.
      placeholder: |
        - [ ] Dockerfile 작성
        - [ ] GitHub Actions workflow 작성
        - [ ] 환경 변수 설정
        - [ ] Nginx 설정
        - [ ] 배포 테스트
    validations:
      required: true

  - type: textarea
    id: reference
    attributes:
      label: 참고 사항
      description: 관련 문서나 아키텍처 다이어그램 링크
    validations:
      required: false
