name: "⚙️ 인프라 / 설정"
description: "CI/CD, Docker, K8s, 환경설정 관련 작업에 사용합니다."
title: "[Infra] "
labels: ["infra"]
body:
  - type: textarea
    id: description
    attributes:
      label: 작업 설명
      description: 어떤 인프라/설정 작업인지 설명해주세요.
      placeholder: "ex) GitHub Actions CI 파이프라인을 구성합니다."
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 작업 목록
      description: 세부 작업 항목을 체크리스트로 작성해주세요.
      placeholder: |
        - [ ] Dockerfile 작성
        - [ ] workflow yml 작성
        - [ ] 시크릿 등록
        - [ ] 배포 테스트
    validations:
      required: true

  - type: textarea
    id: reference
    attributes:
      label: 참고 사항
      description: 관련 문서나 아키텍처 다이어그램 링크
    validations:
      required: false
