name: "🐛 버그 리포트"
description: "버그를 발견했을 때 사용합니다."
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## 버그 리포트
        발견한 버그에 대해 최대한 상세히 작성해주세요.

  - type: textarea
    id: description
    attributes:
      label: 버그 설명
      description: 어떤 버그인지 간단히 설명해주세요.
      placeholder: "ex) 거래처 등록 폼에서 저장 버튼 클릭 시 화면이 멈춥니다."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      description: 버그를 재현할 수 있는 단계를 적어주세요.
      placeholder: |
        1. 거래처 등록 페이지 접속
        2. 필수 항목 입력 후 저장 클릭
        3. 화면 프리징 발생
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 정상적으로 동작했을 때 어떻게 되어야 하나요?
      placeholder: "ex) 거래처가 정상적으로 등록되고 목록 페이지로 이동"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
      description: 현재 어떻게 동작하나요?
      placeholder: "ex) 무한 로딩 상태, 콘솔에 TypeError 출력"
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: 브라우저
      description: 버그가 발생한 브라우저를 선택해주세요.
      multiple: true
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - 기타
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 에러 로그 / 스크린샷
      description: 브라우저 콘솔 에러나 스크린샷을 첨부해주세요.
      render: shell
    validations:
      required: false

  - type: dropdown
    id: domain
    attributes:
      label: 도메인
      options:
        - "domain:auth - 인증"
        - "domain:master - 기준정보"
        - "domain:document - 문서"
        - "domain:activity - 활동"
        - "domain:common - 공통 컴포넌트"
    validations:
      required: true
