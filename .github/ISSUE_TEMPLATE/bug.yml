name: "🐛 버그 리포트"
description: "버그를 발견했을 때 사용합니다."
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## 버그 리포트
        발견한 버그에 대해 최대한 상세히 작성해주세요.

  - type: textarea
    id: description
    attributes:
      label: 버그 설명
      description: 어떤 버그인지 간단히 설명해주세요.
      placeholder: "ex) 거래처 등록 시 500 에러가 발생합니다."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      description: 버그를 재현할 수 있는 단계를 적어주세요.
      placeholder: |
        1. 거래처 등록 페이지 접속
        2. 필수 항목 입력 후 저장 클릭
        3. 500 Internal Server Error 발생
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 정상적으로 동작했을 때 어떻게 되어야 하나요?
      placeholder: "ex) 거래처가 정상적으로 등록되고 목록 페이지로 이동"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
      description: 현재 어떻게 동작하나요?
      placeholder: "ex) 500 에러 응답, 콘솔에 NullPointerException 출력"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 에러 로그
      description: 관련 에러 로그가 있다면 붙여주세요.
      render: shell
    validations:
      required: false

  - type: dropdown
    id: domain
    attributes:
      label: 도메인
      options:
        - Auth
        - Master
        - Document
        - Activity
        - Frontend
        - Infra
    validations:
      required: true
