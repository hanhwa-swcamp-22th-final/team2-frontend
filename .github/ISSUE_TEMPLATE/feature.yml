name: "✨ 기능 요청"
description: "새로운 기능을 추가할 때 사용합니다."
title: "[Feature] "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        ## 기능 요청
        구현할 기능에 대해 작성해주세요.

  - type: textarea
    id: description
    attributes:
      label: 기능 설명
      description: 어떤 기능인지 간단히 설명해주세요.
      placeholder: "ex) 거래처 목록 조회 페이지를 구현합니다."
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 작업 목록
      description: 세부 작업 항목을 체크리스트로 작성해주세요.
      placeholder: |
        - [ ] 페이지 컴포넌트 작성
        - [ ] API 연동 (React Query)
        - [ ] 상태 관리 구현
        - [ ] UI 스타일링
        - [ ] 반응형 처리
    validations:
      required: true

  - type: dropdown
    id: domain
    attributes:
      label: 도메인
      options:
        - "domain:auth - 인증"
        - "domain:master - 기준정보"
        - "domain:document - 문서"
        - "domain:activity - 활동"
        - "domain:common - 공통 컴포넌트"
    validations:
      required: true

  - type: textarea
    id: screens
    attributes:
      label: 화면 설계
      description: Figma 링크나 스크린샷을 첨부해주세요.
      placeholder: "ex) Figma 링크: https://www.figma.com/..."
    validations:
      required: false

  - type: textarea
    id: api
    attributes:
      label: 연동 API
      description: 이 기능에서 사용하는 백엔드 API를 적어주세요.
      placeholder: |
        - GET /api/partners - 거래처 목록 조회
        - POST /api/partners - 거래처 등록
    validations:
      required: false

  - type: textarea
    id: reference
    attributes:
      label: 참고 사항
      description: 관련 문서, 화면 설계서, 기획서 등
      placeholder: "ex) Notion 기획 문서, Swagger 링크"
    validations:
      required: false
