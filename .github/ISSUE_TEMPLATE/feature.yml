name: "✨ 기능 요청"
description: "새로운 기능을 추가할 때 사용합니다."
title: "[Feature] "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        ## 기능 요청
        구현할 기능에 대해 작성해주세요.

  - type: textarea
    id: description
    attributes:
      label: 기능 설명
      description: 어떤 기능인지 간단히 설명해주세요.
      placeholder: "ex) 거래처 목록 조회 API를 구현합니다."
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 작업 목록
      description: 세부 작업 항목을 체크리스트로 작성해주세요.
      placeholder: |
        - [ ] Controller 작성
        - [ ] Service 로직 구현
        - [ ] Repository 쿼리 작성
        - [ ] 테스트 코드 작성
    validations:
      required: true

  - type: dropdown
    id: domain
    attributes:
      label: 도메인
      options:
        - Auth
        - Master
        - Document
        - Activity
        - Frontend
        - Infra
    validations:
      required: true

  - type: textarea
    id: reference
    attributes:
      label: 참고 사항
      description: 관련 문서, 화면 설계서, API 명세 등
      placeholder: "ex) Figma 링크, ERD 참고"
    validations:
      required: false
